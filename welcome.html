<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Satnam Sakhi</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ffcc70,#ff8177);
    font-family:Segoe UI;
    text-align:center;
}

/* Satnam text */

h1{
    font-size:60px;
    color:white;
    text-shadow:0 0 20px gold;
}

/* Sakhi text */

h2{
    font-size:35px;
    color:#fff8dc;
    margin-top:-10px;
}

/* Enter button */

.enter-btn{
    margin-top:40px;
    padding:15px 40px;
    font-size:20px;
    background:gold;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-weight:bold;
}

.enter-btn:hover{
    background:#ffdd44;
    transform:scale(1.05);
}

</style>
</head>

<body>

<h1>ॐ</h1>
<h1>Satnam</h1>
<h2>Sakhi</h2>

<a href="index.html">
<button class="enter-btn">Enter Website</button>
</a>

</body>
</html>
